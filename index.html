<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP Assistant, Zayed University</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="phone-frame">
    <div class="app">

      <!-- Header -->
      <header class="app-header">
        <div class="crest" aria-hidden="true">ZU</div>
        <div class="header-text">
          <h1>SAP Assistant</h1>
          <p class="status"><span class="dot"></span>Online, proposed concept demo</p>
        </div>
        <button class="reset-btn" id="resetBtn" title="Restart conversation" aria-label="Restart conversation">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4v6h6M20 20v-6h-6"/>
            <path d="M20 8a8 8 0 0 0-14.9-3.2M4 16a8 8 0 0 0 14.9 3.2"/>
          </svg>
        </button>
      </header>

      <!-- Chat log -->
      <main class="chat-log" id="chatLog" aria-live="polite"></main>

      <!-- Quick replies -->
      <div class="quick-replies" id="quickReplies">
        <button class="chip" data-query="How do I register for classes?">Registration</button>
        <button class="chip" data-query="Where can I see my grades?">Grades</button>
        <button class="chip" data-query="What's my graduation status?">Graduation status</button>
        <button class="chip" data-query="Show my course schedule">Course schedule</button>
        <button class="chip" data-query="What's my attendance?">Attendance</button>
        <button class="chip" data-query="Who is my academic advisor?">Advisor</button>
      </div>

      <!-- Input -->
      <form class="composer" id="composerForm" autocomplete="off">
        <input
          type="text"
          id="messageInput"
          placeholder="Ask about registration, grades, courses…"
          aria-label="Type a message"
        />
        <button type="submit" class="send-btn" aria-label="Send message">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 2 11 13"/>
            <path d="M22 2 15 22l-4-9-9-4 20-7Z"/>
          </svg>
        </button>
      </form>

      <p class="disclaimer">Demo only. Responses are pre-scripted to illustrate the capstone concept, not a live SAP integration.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
